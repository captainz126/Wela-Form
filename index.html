<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certified Wela Form</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#020617,#0f172a);
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    h1 {margin-bottom:20px}
    form {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      max-width: 450px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    input, select, textarea, button {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }
    button {
      background: linear-gradient(90deg,#22c55e,#4ade80);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    #certificate {
      display: none;
      margin-top: 30px;
      padding: 25px;
      border-radius: 15px;
      background: #020617;
      border: 4px solid gold;
      max-width: 500px;
      margin-left:auto;
      margin-right:auto;
    }
    #logo {
      font-size: 40px;
    }
    #downloadBtn {
      margin-top:15px;
      background:#3b82f6;
    }
  </style>
</head>
<body>  <h1>😎 Form for Wely Log 😎</h1>  <form id="welaForm">
    <input type="text" id="name" placeholder="Enter Your Name" required><input type="text" id="father" placeholder="Father's Name (If have 😁)">

<select id="profession" required>
  <option value="">Select Profession</option>
  <option>Wela</option>
  <option>Wela Pro</option>
  <option>Wela Pro Max</option>
  <option>Ultra Wela Pro Max</option>
</select>

<input type="text" id="skills" placeholder="Your Skills">

<textarea id="reason" placeholder="Why you joining this group?" rows="4"></textarea>

<button type="submit">Submit & Get Certified 😎</button>

  </form>  <div id="certificate">
    <div id="logo">😂🏆 WELA ASSOCIATION</div>
    <h2>🎓 Certified Wela 😎</h2>
    <p id="certContent"></p>
    <p><strong>Comment:</strong> Bhai tum officially group ke certified wela ho 😂🔥 Ab bas bakchodi level maintain rakhna!</p>
    <button id="downloadBtn">Download Certificate</button>
  </div>  <script>
    const form = document.getElementById('welaForm');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const data = {
        name: document.getElementById('name').value,
        father: document.getElementById('father').value || 'N/A',
        profession: document.getElementById('profession').value,
        skills: document.getElementById('skills').value,
        reason: document.getElementById('reason').value
      };

      // Store locally
      let responses = JSON.parse(localStorage.getItem('welaResponses')) || [];
      responses.push(data);
      localStorage.setItem('welaResponses', JSON.stringify(responses));

      document.getElementById('certContent').innerHTML = `
        Name: ${data.name}<br>
        Father's Name: ${data.father}<br>
        Profession: ${data.profession}<br>
        Skills: ${data.skills}<br>
        Reason: ${data.reason}`;

      document.getElementById('certificate').style.display = 'block';
    });

    // Download certificate
    document.getElementById('downloadBtn').addEventListener('click', () => {
      html2canvas(document.getElementById('certificate')).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Certified_Wela.png';
        link.href = canvas.toDataURL();
        link.click();
      });
    });
  </script></body>
</html>
